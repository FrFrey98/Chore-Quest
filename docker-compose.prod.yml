# Production deployment template for Chore-Quest
# Copy this file and replace <your-github-username> with your GitHub username.
# For optional auto-updates with Watchtower, see the README.

services:
  app:
    image: ghcr.io/<your-github-username>/chore-quest:latest
    ports:
      - "3333:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/haushalts.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    restart: unless-stopped
